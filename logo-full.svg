<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <g transform="translate(8, 5)">
    <path d="M 42 5 L 75 15 L 75 45 C 75 65 60 80 42 88 C 24 80 9 65 9 45 L 9 15 Z" fill="url(#navyGrad)"/>
    
    <!-- Inner shield highlight -->
    <path d="M 42 12 L 68 20 L 68 44 C 68 60 56 72 42 78 C 28 72 16 60 16 44 L 16 20 Z" fill="none" stroke="url(#tealGrad)" stroke-width="2"/>
    
    <!-- Checkmark with dollar -->
    <circle cx="42" cy="42" r="18" fill="url(#tealGrad)"/>
    <path d="M 32 42 L 39 49 L 54 34" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#0f172a" letter-spacing="-1">
    BalanceBooks
  </text>
  
  <!-- PRO badge integrated -->
  <rect x="355" y="28" width="50" height="26" rx="5" fill="url(#tealGrad)"/>
  <text x="380" y="47" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">PRO</text>
  
  <!-- Tagline -->
  <text x="100" y="72" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="2">
    SECURE PERSONAL FINANCE
  </text>
</svg>
